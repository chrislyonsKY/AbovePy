site_name: abovepy
site_description: KyFromAbove LiDAR, DEM, and orthoimagery access for Python
site_author: Chris Lyons
site_url: https://chrislyonsKY.github.io/AbovePy/
repo_url: https://github.com/chrislyonsKY/AbovePy
repo_name: chrislyonsKY/AbovePy
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: light green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - navigation.instant
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/chrislyonsKY/AbovePy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            docstring_style: numpy
            show_root_heading: true
            show_root_full_path: false
            heading_level: 3
            members_order: source

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Tutorials:
    - DEM + Hillshade: tutorials/dem-hillshade.md
    - LiDAR Access: tutorials/lidar-access.md
    - Web Maps (TiTiler): tutorials/titiler-maps.md
    - ArcGIS Pro Toolbox: tutorials/arcgis-pro.md
    - Troubleshooting: tutorials/troubleshooting.md
  - KyFromAbove Collections: stac-collections.md
  - Architecture: architecture.md
  - API Reference: api/reference.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
