<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KyFromAbove DEM Viewer</title>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; }
    #map { width: 100vw; height: 100vh; }
    .overlay {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(255, 255, 255, 0.9);
      padding: 12px 16px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      z-index: 1;
      max-width: 320px;
    }
    .overlay h3 { margin-bottom: 8px; font-size: 14px; }
    .overlay p { font-size: 12px; color: #666; margin-bottom: 8px; }
    .overlay label { font-size: 12px; font-weight: 600; }
    .overlay input {
      width: 100%;
      padding: 6px 8px;
      margin: 4px 0 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 12px;
    }
    .overlay button {
      background: #7c3aed;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .overlay button:hover { background: #5b21b6; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="overlay">
    <h3>KyFromAbove DEM Viewer</h3>
    <p>Enter a TiTiler endpoint and COG URL to visualize a DEM tile.</p>
    <label>TiTiler Endpoint</label>
    <input type="text" id="titiler" value="http://localhost:8000" />
    <label>COG URL (S3 or HTTPS)</label>
    <input type="text" id="cog-url" placeholder="https://s3.amazonaws.com/kyfromabove/..." />
    <button onclick="loadTile()">Load Tile</button>
  </div>

  <script>
    const map = new maplibregl.Map({
      container: 'map',
      style: {
        version: 8,
        sources: {
          osm: {
            type: 'raster',
            tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
            tileSize: 256,
            attribution: '&copy; OpenStreetMap contributors'
          }
        },
        layers: [{
          id: 'osm',
          type: 'raster',
          source: 'osm'
        }]
      },
      center: [-85.3, 37.8],
      zoom: 7
    });

    map.addControl(new maplibregl.NavigationControl());

    function loadTile() {
      const titiler = document.getElementById('titiler').value.replace(/\/$/, '');
      const cogUrl = document.getElementById('cog-url').value;

      if (!cogUrl) {
        alert('Please enter a COG URL');
        return;
      }

      const tilejsonUrl = `${titiler}/cog/tilejson.json?url=${encodeURIComponent(cogUrl)}`;

      // Remove existing DEM layer if present
      if (map.getLayer('dem-layer')) map.removeLayer('dem-layer');
      if (map.getSource('dem')) map.removeSource('dem');

      map.addSource('dem', {
        type: 'raster',
        url: tilejsonUrl,
        tileSize: 256
      });

      map.addLayer({
        id: 'dem-layer',
        type: 'raster',
        source: 'dem',
        paint: { 'raster-opacity': 0.8 }
      });

      // Fetch bounds and fly to tile
      fetch(tilejsonUrl)
        .then(r => r.json())
        .then(tj => {
          if (tj.bounds) {
            map.fitBounds(tj.bounds, { padding: 40 });
          }
        })
        .catch(err => console.error('Failed to load tilejson:', err));
    }
  </script>
</body>
</html>
