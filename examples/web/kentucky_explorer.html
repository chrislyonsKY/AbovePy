<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KyFromAbove Explorer</title>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    #map { width: 100vw; height: 100vh; }

    .panel {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 320px;
      background: rgba(22, 22, 40, 0.94);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 16px;
      z-index: 2;
      backdrop-filter: blur(12px);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      max-height: calc(100vh - 20px);
      overflow-y: auto;
    }

    .panel h2 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
      color: #fff;
    }

    .panel .subtitle {
      font-size: 11px;
      color: #888;
      margin-bottom: 14px;
      display: block;
    }

    .panel hr {
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      margin: 12px 0;
    }

    .form-group {
      margin-bottom: 10px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .form-group select,
    .form-group input[type="text"] {
      width: 100%;
      padding: 7px 10px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 12px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group select:focus,
    .form-group input[type="text"]:focus {
      border-color: rgba(124, 58, 237, 0.6);
    }

    .form-group select option {
      background: #1a1a2e;
      color: #e0e0e0;
    }

    .btn {
      width: 100%;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      font-family: inherit;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: #7c3aed;
      color: #fff;
    }

    .btn-primary:hover {
      background: #6d28d9;
    }

    .btn-primary:disabled {
      background: #4a4a5a;
      cursor: not-allowed;
    }

    .slider-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .slider-group input[type="range"] {
      flex: 1;
      accent-color: #7c3aed;
      height: 4px;
    }

    .slider-group .slider-val {
      font-size: 11px;
      color: #aaa;
      min-width: 32px;
      text-align: right;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
    }

    .toggle-row span {
      font-size: 12px;
      color: #ccc;
    }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      transition: 0.2s;
    }

    .toggle .slider::before {
      content: '';
      position: absolute;
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.2s;
    }

    .toggle input:checked + .slider {
      background: #7c3aed;
    }

    .toggle input:checked + .slider::before {
      transform: translateX(16px);
    }

    .status {
      font-size: 11px;
      padding: 6px 8px;
      border-radius: 4px;
      margin-top: 8px;
      display: none;
    }

    .status.info {
      display: block;
      background: rgba(124, 58, 237, 0.15);
      color: #c4b5fd;
      border: 1px solid rgba(124, 58, 237, 0.25);
    }

    .status.error {
      display: block;
      background: rgba(239, 68, 68, 0.15);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.25);
    }

    .status.success {
      display: block;
      background: rgba(34, 197, 94, 0.15);
      color: #86efac;
      border: 1px solid rgba(34, 197, 94, 0.25);
    }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #ccc;
      margin-bottom: 8px;
    }

    .maplibregl-ctrl-attrib {
      background: rgba(22, 22, 40, 0.7) !important;
      color: #888 !important;
    }

    .maplibregl-ctrl-attrib a {
      color: #aaa !important;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="panel">
    <h2>KyFromAbove Explorer</h2>
    <span class="subtitle">Interactive viewer for Kentucky elevation and imagery</span>

    <hr>

    <div class="section-title">Data Source</div>

    <div class="form-group">
      <label>Product</label>
      <select id="product-select">
        <optgroup label="Digital Elevation Models">
          <option value="dem_phase1">DEM Phase 1 (5ft)</option>
          <option value="dem_phase2">DEM Phase 2 (2ft)</option>
          <option value="dem_phase3" selected>DEM Phase 3 (2ft)</option>
        </optgroup>
        <optgroup label="Orthoimagery">
          <option value="ortho_phase1">Ortho Phase 1 (6in)</option>
          <option value="ortho_phase2">Ortho Phase 2 (6in)</option>
          <option value="ortho_phase3">Ortho Phase 3 (3in)</option>
        </optgroup>
      </select>
    </div>

    <div class="form-group">
      <label>COG URL</label>
      <input type="text" id="cog-url" value="https://kyfromabove.s3.us-west-2.amazonaws.com/elevation/DEM/Phase3/N087E279_2025_DEM_Phase3_cog.tif" />
    </div>

    <div class="form-group">
      <label>Color Ramp (DEM only)</label>
      <select id="colormap-select">
        <option value="terrain">Terrain</option>
        <option value="viridis">Viridis</option>
        <option value="gray">Grayscale</option>
      </select>
    </div>

    <div class="form-group">
      <button class="btn btn-primary" id="load-btn" onclick="loadTile()">Load Tile</button>
    </div>

    <div id="status" class="status"></div>

    <hr>

    <div class="section-title">Layer Controls</div>

    <div class="form-group">
      <label>Opacity</label>
      <div class="slider-group">
        <input type="range" id="opacity-slider" min="0" max="100" value="85" oninput="updateOpacity(this.value)" />
        <span class="slider-val" id="opacity-val">85%</span>
      </div>
    </div>

    <div class="toggle-row">
      <span>Raster Layer</span>
      <label class="toggle">
        <input type="checkbox" id="layer-toggle" checked onchange="toggleLayer(this.checked)" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="toggle-row">
      <span>Kentucky Boundary</span>
      <label class="toggle">
        <input type="checkbox" id="boundary-toggle" checked onchange="toggleBoundary(this.checked)" />
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <script>
    // -----------------------------------------------------------
    // Default tile URLs per product
    // -----------------------------------------------------------
    const PRODUCT_DEFAULTS = {
      dem_phase1: 'https://kyfromabove.s3.us-west-2.amazonaws.com/elevation/DEM/Phase1/N087E279_DEM_Phase1_cog.tif',
      dem_phase2: 'https://kyfromabove.s3.us-west-2.amazonaws.com/elevation/DEM/Phase2/N087E279_DEM_Phase2_cog.tif',
      dem_phase3: 'https://kyfromabove.s3.us-west-2.amazonaws.com/elevation/DEM/Phase3/N087E279_2025_DEM_Phase3_cog.tif',
      ortho_phase1: 'https://kyfromabove.s3.us-west-2.amazonaws.com/imagery/orthos/Phase1/N087E279_Ortho_Phase1_cog.tif',
      ortho_phase2: 'https://kyfromabove.s3.us-west-2.amazonaws.com/imagery/orthos/Phase2/N087E279_Ortho_Phase2_cog.tif',
      ortho_phase3: 'https://kyfromabove.s3.us-west-2.amazonaws.com/imagery/orthos/Phase3/N087E279_2025_Ortho_Phase3_cog.tif',
    };

    const TITILER_ENDPOINT = 'https://titiler.xyz';

    // -----------------------------------------------------------
    // Simplified Kentucky state boundary (GeoJSON)
    // Approximate outline for display purposes
    // -----------------------------------------------------------
    const KY_BOUNDARY = {
      type: 'Feature',
      properties: { name: 'Kentucky' },
      geometry: {
        type: 'Polygon',
        coordinates: [[
          [-89.57, 36.50], [-89.54, 36.50], [-89.30, 36.51], [-89.13, 36.98],
          [-88.07, 36.68], [-88.05, 36.50], [-87.85, 36.63], [-86.60, 36.65],
          [-86.51, 36.63], [-85.79, 36.62], [-85.29, 36.63], [-84.86, 36.61],
          [-84.22, 36.59], [-83.69, 36.60], [-83.53, 36.67], [-83.14, 36.59],
          [-82.85, 36.60], [-82.56, 36.60], [-82.22, 36.59], [-81.93, 36.59],
          [-81.93, 36.62], [-82.03, 36.87], [-82.09, 36.96], [-82.35, 37.27],
          [-82.49, 37.23], [-82.56, 37.20], [-82.73, 37.29], [-82.72, 37.37],
          [-82.87, 37.50], [-82.88, 37.57], [-83.02, 37.64], [-83.14, 37.61],
          [-83.23, 37.67], [-83.36, 37.72], [-83.53, 37.84], [-83.64, 37.87],
          [-83.66, 37.93], [-83.77, 37.95], [-83.88, 38.02], [-83.89, 38.06],
          [-83.98, 38.18], [-84.05, 38.11], [-84.21, 38.20], [-84.23, 38.37],
          [-84.30, 38.39], [-84.40, 38.40], [-84.43, 38.47], [-84.47, 38.53],
          [-84.60, 38.49], [-84.63, 38.53], [-84.68, 38.56], [-84.78, 38.63],
          [-84.81, 38.78], [-84.84, 38.79], [-84.88, 38.80], [-84.83, 38.83],
          [-84.81, 38.90], [-84.82, 38.95], [-84.90, 39.05], [-84.87, 39.07],
          [-84.83, 39.10], [-84.80, 39.10], [-84.75, 39.14], [-84.72, 39.15],
          [-84.62, 39.07], [-84.52, 39.10], [-84.43, 39.09], [-84.33, 38.99],
          [-84.23, 38.88], [-84.10, 38.80], [-83.88, 38.74], [-83.65, 38.63],
          [-83.53, 38.70], [-83.35, 38.63], [-83.26, 38.60], [-83.14, 38.63],
          [-83.05, 38.68], [-82.86, 38.73], [-82.66, 38.51], [-82.57, 38.41],
          [-82.59, 38.35], [-82.44, 38.18], [-82.33, 38.09], [-82.28, 37.95],
          [-82.19, 37.97], [-82.14, 38.03], [-82.05, 38.10], [-81.97, 38.21],
          [-81.93, 38.28], [-81.93, 38.39], [-81.90, 38.44], [-81.84, 38.51],
          [-81.78, 38.54], [-81.76, 38.63], [-81.80, 38.67], [-81.82, 38.71],
          [-81.82, 38.76], [-81.78, 38.78], [-81.77, 38.84], [-81.83, 38.90],
          [-81.90, 38.89], [-81.96, 38.88], [-81.99, 38.86], [-82.06, 38.95],
          [-82.18, 38.90], [-82.22, 38.79], [-82.35, 38.72], [-82.42, 38.60],

          [-84.43, 39.08], [-84.50, 39.10], [-84.63, 39.08], [-84.73, 39.15],
          [-84.82, 39.10], [-84.90, 39.07], [-85.02, 39.04], [-85.17, 38.69],
          [-85.34, 38.73], [-85.42, 38.72], [-85.47, 38.68], [-85.51, 38.55],
          [-85.62, 38.45], [-85.68, 38.33], [-85.75, 38.27], [-85.74, 38.23],
          [-85.78, 38.18], [-85.83, 38.14], [-85.85, 38.10], [-85.90, 38.03],
          [-85.92, 37.99], [-85.94, 37.99], [-85.95, 38.01], [-86.04, 37.96],
          [-86.10, 38.01], [-86.19, 38.00], [-86.26, 38.05], [-86.32, 38.12],
          [-86.38, 38.18], [-86.46, 38.12], [-86.51, 38.05], [-86.52, 37.97],
          [-86.59, 37.92], [-86.62, 37.85], [-86.65, 37.86], [-86.72, 37.89],
          [-86.74, 37.84], [-86.82, 37.79], [-86.90, 37.88], [-86.96, 37.93],
          [-87.03, 37.92], [-87.07, 37.80], [-87.12, 37.79], [-87.18, 37.84],
          [-87.30, 37.88], [-87.38, 37.93], [-87.51, 37.91], [-87.59, 37.83],
          [-87.64, 37.83], [-87.68, 37.90], [-87.70, 37.90], [-87.74, 37.89],
          [-87.83, 37.88], [-87.90, 37.79], [-87.94, 37.77], [-87.93, 37.73],
          [-87.97, 37.72], [-88.01, 37.80], [-88.03, 37.80], [-88.06, 37.74],
          [-88.04, 37.67], [-88.07, 37.51], [-88.09, 37.47], [-88.16, 37.46],
          [-88.28, 37.45], [-88.38, 37.40], [-88.47, 37.38], [-88.51, 37.29],
          [-88.49, 37.23], [-88.45, 37.16], [-88.42, 37.10], [-88.48, 37.07],
          [-88.51, 37.07], [-88.56, 37.08], [-88.61, 37.12], [-88.75, 37.14],
          [-88.93, 37.22], [-89.03, 37.21], [-89.10, 37.09], [-89.17, 37.06],
          [-89.17, 36.98], [-89.18, 36.94], [-89.13, 36.98], [-89.30, 36.51],
          [-89.42, 36.50], [-89.57, 36.50]
        ]]
      }
    };

    // -----------------------------------------------------------
    // Map initialization — dark basemap
    // -----------------------------------------------------------
    const map = new maplibregl.Map({
      container: 'map',
      style: {
        version: 8,
        sources: {
          'carto-dark': {
            type: 'raster',
            tiles: [
              'https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png',
              'https://b.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png',
              'https://c.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png'
            ],
            tileSize: 256,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>'
          }
        },
        layers: [{
          id: 'carto-dark',
          type: 'raster',
          source: 'carto-dark'
        }],
        glyphs: 'https://fonts.openmaptiles.org/{fontstack}/{range}.pbf'
      },
      center: [-85.75, 37.85],
      zoom: 7,
      maxZoom: 20
    });

    map.addControl(new maplibregl.NavigationControl(), 'top-right');
    map.addControl(new maplibregl.ScaleControl({ maxWidth: 200 }), 'bottom-right');

    // -----------------------------------------------------------
    // Add Kentucky boundary on load
    // -----------------------------------------------------------
    map.on('load', function () {
      map.addSource('ky-boundary', {
        type: 'geojson',
        data: {
          type: 'FeatureCollection',
          features: [KY_BOUNDARY]
        }
      });

      map.addLayer({
        id: 'ky-boundary-line',
        type: 'line',
        source: 'ky-boundary',
        paint: {
          'line-color': '#7c3aed',
          'line-width': 2,
          'line-opacity': 0.7
        }
      });

      map.addLayer({
        id: 'ky-boundary-fill',
        type: 'fill',
        source: 'ky-boundary',
        paint: {
          'fill-color': '#7c3aed',
          'fill-opacity': 0.04
        }
      });
    });

    // -----------------------------------------------------------
    // Update COG URL when product changes
    // -----------------------------------------------------------
    document.getElementById('product-select').addEventListener('change', function () {
      const product = this.value;
      const urlInput = document.getElementById('cog-url');
      const colormapSelect = document.getElementById('colormap-select');

      if (PRODUCT_DEFAULTS[product]) {
        urlInput.value = PRODUCT_DEFAULTS[product];
      }

      // Enable/disable colormap for DEM vs Ortho
      const isDem = product.startsWith('dem_');
      colormapSelect.disabled = !isDem;
      colormapSelect.style.opacity = isDem ? '1' : '0.4';
    });

    // -----------------------------------------------------------
    // Load tile via TiTiler
    // -----------------------------------------------------------
    function loadTile() {
      const cogUrl = document.getElementById('cog-url').value.trim();
      const product = document.getElementById('product-select').value;
      const colormap = document.getElementById('colormap-select').value;
      const loadBtn = document.getElementById('load-btn');

      if (!cogUrl) {
        setStatus('Please enter a COG URL.', 'error');
        return;
      }

      loadBtn.disabled = true;
      loadBtn.textContent = 'Loading...';
      setStatus('Fetching tile metadata from TiTiler...', 'info');

      // Build TiTiler tilejson URL
      const isDem = product.startsWith('dem_');
      let tilejsonUrl = TITILER_ENDPOINT + '/cog/tilejson.json?url=' + encodeURIComponent(cogUrl);

      if (isDem) {
        tilejsonUrl += '&colormap_name=' + encodeURIComponent(colormap);
        tilejsonUrl += '&rescale=200,500';
      }

      // Remove existing raster layer if present
      if (map.getLayer('cog-layer')) map.removeLayer('cog-layer');
      if (map.getSource('cog-source')) map.removeSource('cog-source');

      // Fetch tilejson to get bounds, then add to map
      fetch(tilejsonUrl)
        .then(function (response) {
          if (!response.ok) throw new Error('TiTiler returned HTTP ' + response.status);
          return response.json();
        })
        .then(function (tilejson) {
          map.addSource('cog-source', {
            type: 'raster',
            tiles: tilejson.tiles,
            bounds: tilejson.bounds,
            minzoom: tilejson.minzoom || 0,
            maxzoom: tilejson.maxzoom || 22,
            tileSize: 256
          });

          // Insert raster layer below the boundary outline
          var beforeLayer = map.getLayer('ky-boundary-fill') ? 'ky-boundary-fill' : undefined;

          var opacity = parseInt(document.getElementById('opacity-slider').value, 10) / 100;
          map.addLayer({
            id: 'cog-layer',
            type: 'raster',
            source: 'cog-source',
            paint: {
              'raster-opacity': opacity
            }
          }, beforeLayer);

          // Fly to the tile bounds
          if (tilejson.bounds) {
            map.fitBounds([
              [tilejson.bounds[0], tilejson.bounds[1]],
              [tilejson.bounds[2], tilejson.bounds[3]]
            ], { padding: 60, maxZoom: 16 });
          }

          // Sync toggle state
          document.getElementById('layer-toggle').checked = true;

          setStatus('Tile loaded successfully.', 'success');
          loadBtn.disabled = false;
          loadBtn.textContent = 'Load Tile';
        })
        .catch(function (err) {
          console.error('Failed to load tile:', err);
          setStatus('Failed to load tile: ' + err.message, 'error');
          loadBtn.disabled = false;
          loadBtn.textContent = 'Load Tile';
        });
    }

    // -----------------------------------------------------------
    // Layer controls
    // -----------------------------------------------------------
    function updateOpacity(value) {
      document.getElementById('opacity-val').textContent = value + '%';
      if (map.getLayer('cog-layer')) {
        map.setPaintProperty('cog-layer', 'raster-opacity', value / 100);
      }
    }

    function toggleLayer(visible) {
      if (map.getLayer('cog-layer')) {
        map.setLayoutProperty('cog-layer', 'visibility', visible ? 'visible' : 'none');
      }
    }

    function toggleBoundary(visible) {
      var vis = visible ? 'visible' : 'none';
      if (map.getLayer('ky-boundary-line')) {
        map.setLayoutProperty('ky-boundary-line', 'visibility', vis);
      }
      if (map.getLayer('ky-boundary-fill')) {
        map.setLayoutProperty('ky-boundary-fill', 'visibility', vis);
      }
    }

    // -----------------------------------------------------------
    // Status messages
    // -----------------------------------------------------------
    function setStatus(message, type) {
      var el = document.getElementById('status');
      el.textContent = message;
      el.className = 'status ' + type;
    }
  </script>
</body>
</html>
